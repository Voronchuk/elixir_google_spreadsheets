name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (elixir ${{ matrix.elixir }} / otp ${{ matrix.otp }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - elixir: "1.18"
            otp: "27"
          - elixir: "1.19"
            otp: "28"
          - elixir: "1.20"
            otp: "29"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ matrix.elixir }}
          otp-version: ${{ matrix.otp }}
          version-type: loose

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-otp-${{ matrix.otp }}-elixir-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-${{ matrix.otp }}-elixir-${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      - name: Run tests
        run: mix test

  lint:
    # Runs on the newest toolchain pair only.
    name: lint (credo + dialyzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.20"
          otp-version: "29"
          version-type: loose

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-otp-29-elixir-1.20-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-29-elixir-1.20-

      - name: Install dependencies
        run: mix deps.get

      - name: Run credo
        run: mix credo --strict

      # PLT is restored/saved as a separate step (rather than relying on the
      # `save-always` input, which is deprecated - see
      # https://github.com/actions/cache/tree/main/save#always-save-cache) so the PLT is
      # still cached even when the dialyzer step below fails.
      - name: Restore PLT cache
        id: plt_cache
        uses: actions/cache/restore@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-otp-29-elixir-1.20-plt-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-otp-29-elixir-1.20-plt-

      - name: Create PLTs
        if: steps.plt_cache.outputs.cache-hit != 'true'
        run: mix dialyzer --plt

      - name: Save PLT cache
        if: steps.plt_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-otp-29-elixir-1.20-plt-${{ hashFiles('mix.lock') }}

      - name: Run dialyzer
        run: mix dialyzer --format github
